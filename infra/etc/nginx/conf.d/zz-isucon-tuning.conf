# #E nginx 静的/転送最適化（http コンテキスト）
# gzip: テキスト系のみ圧縮。画像/動画は除外（内容不変・二重圧縮回避）。
# ※gzip は転送エンコーディングのみ。クライアントが展開するので JS/CSS/HTML の内容・DOM は不変。
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  application/rss+xml
  image/svg+xml;

# 静的ファイルのメタ情報(open/stat)キャッシュ
open_file_cache max=100000 inactive=60s;
open_file_cache_valid 60s;
open_file_cache_min_uses 2;
open_file_cache_errors on;

# クライアント側 keepalive
keepalive_timeout 65;
keepalive_requests 10000;
