# #F OSチューニング（ISUCON / Session C）— sysctl.d で恒久化（再起動後も有効）
# 接続バックログ（nginx listen / accept キュー溢れ防止）
net.core.somaxconn = 32768
net.core.netdev_max_backlog = 8192
net.ipv4.tcp_max_syn_backlog = 8192
# TIME_WAIT ソケットの再利用（nginx->app / bench->nginx の短命接続対策）
net.ipv4.tcp_tw_reuse = 1
# 一時ポート枯渇対策
net.ipv4.ip_local_port_range = 10000 65535
# ファイルディスクリプタ上限
fs.file-max = 1000000
